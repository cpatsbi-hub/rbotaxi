<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign in — Office Taxi Tracker</title>
<link rel="stylesheet" href="css/style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;">
    <div class="card" style="max-width:400px;width:100%;">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:22px;">
        <div class="brand-mark">OT</div>
        <div class="brand-name display" style="font-size:18px;">Office Taxi Tracker</div>
      </div>

      <div id="loginForm">
        <h1 style="font-size:18px;margin-bottom:4px;">Welcome back</h1>
        <p class="hint" style="margin-bottom:18px;">Sign in with your work email.</p>
        <div class="field"><label>Email</label><input type="email" id="loginEmail" autocomplete="email"></div>
        <div class="field"><label>Password</label><input type="password" id="loginPassword" autocomplete="current-password"></div>
        <button class="btn btn-primary" style="width:100%;justify-content:center;" id="loginBtn">Sign in</button>
        <p style="margin-top:16px;font-size:13px;text-align:center;color:var(--text-muted);">
          New here? <a href="#" id="showRegister">Create an account</a>
        </p>
      </div>

      <div id="registerForm" style="display:none;">
        <h1 style="font-size:18px;margin-bottom:4px;">Create your account</h1>
        <p class="hint" style="margin-bottom:18px;">Anyone with a valid email can register.</p>
        <div class="field"><label>Full name</label><input type="text" id="regName"></div>
        <div class="field"><label>Email</label><input type="email" id="regEmail" autocomplete="email"></div>
        <div class="field"><label>Password</label><input type="password" id="regPassword" autocomplete="new-password"></div>
        <button class="btn btn-primary" style="width:100%;justify-content:center;" id="registerBtn">Create account</button>
        <p style="margin-top:16px;font-size:13px;text-align:center;color:var(--text-muted);">
          Already registered? <a href="#" id="showLogin">Sign in</a>
        </p>
      </div>
    </div>
  </div>
  <div class="footer-credit">Concept by Josmy Joseph and designed by Sunil C P</div>

  <script src="js/supabase-client-v2.js"></script>
  <script>
    document.getElementById("showRegister").addEventListener("click", (e) => {
      e.preventDefault();
      document.getElementById("loginForm").style.display = "none";
      document.getElementById("registerForm").style.display = "block";
    });
    document.getElementById("showLogin").addEventListener("click", (e) => {
      e.preventDefault();
      document.getElementById("registerForm").style.display = "none";
      document.getElementById("loginForm").style.display = "block";
    });

    document.getElementById("loginBtn").addEventListener("click", async () => {
      const email = document.getElementById("loginEmail").value.trim();
      const password = document.getElementById("loginPassword").value;
      const { error } = await sb.auth.signInWithPassword({ email, password });
      if (error) { showToast(error.message, "error"); return; }
      window.location.href = "index.html";
    });

    document.getElementById("registerBtn").addEventListener("click", async () => {
      const full_name = document.getElementById("regName").value.trim();
      const email = document.getElementById("regEmail").value.trim();
      const password = document.getElementById("regPassword").value;
      if (!full_name || !email || !password) { showToast("Please fill in every field.", "error"); return; }
      const { error } = await sb.auth.signUp({
        email, password, options: { data: { full_name } }
      });
      if (error) { showToast(error.message, "error"); return; }
      showToast("Account created. Check your email if confirmation is required, then sign in.", "success");
      document.getElementById("registerForm").style.display = "none";
      document.getElementById("loginForm").style.display = "block";
    });

    // Already signed in? skip straight to the dashboard.
    sb.auth.getSession().then(({ data: { session } }) => {
      if (session) window.location.href = "index.html";
    });
  </script>
</body>
</html>
